name: Deploy to GitHub Pages

# ワークフロー共有設定
on:
  workflow_call:
    inputs:
      timeout-minutes:
        description: 'タイムアウト（分）'
        type: number
        default: 15

      frontend-dir:
        description: 'フロントエンドディレクトリ'
        type: string
        default: 'apps/front'

      document-dir:
        description: 'ドキュメントディレクトリ'
        type: string
        default: 'docs'

      npm-install-command:
        description: 'npm installコマンド'
        type: string
        default: 'npm ci'

      node-version:
        description: 'nodeバージョン'
        type: string
        default: '22'

      backend-dir:
        description: 'バックエンドディレクトリ'
        type: string
        default: 'apps/back'

      java-version:
        description: 'Javaバージョン'
        type: string
        default: '21'

      distribution:
        description: 'Java distribution'
        type: string
        default: 'temurin'

      build-storybook:
        description: 'Storybookビルド実行フラグ'
        type: boolean
        default: true

      build-javadoc:
        description: 'Javadocビルド実行フラグ'
        type: boolean
        default: true

      build-openapi:
        description: 'OpenAPI ドキュメントビルド実行フラグ'
        type: boolean
        default: true

      is-deploy:
        description: 'デプロイ実行フラグ'
        type: boolean
        default: false

env:
  TZ: Asia/Tokyo

permissions:
  contents: read
  pages: write
  id-token: write

# jobs: 動作内容
jobs:
  # Docsify ドキュメントのアップロード処理
  build-docs:
    name: Upload Docs Artifact
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout-minutes }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Upload docs artifact
        uses: actions/upload-artifact@v7
        with:
          name: pages-docs
          path: ${{ inputs.document-dir }}

  # Storybook のビルド処理
  build-storybook:
    name: Build Storybook
    if: ${{ inputs.build-storybook || inputs.is-deploy }}
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout-minutes }}

    defaults:
      run:
        working-directory: ${{ inputs.frontend-dir }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
          cache-dependency-path: ${{ inputs.frontend-dir }}/package-lock.json

      - name: Install dependencies
        run: ${{ inputs.npm-install-command }}

      # Storybook ビルド
      - name: Build Storybook
        run: npm run build-storybook

      - name: Upload Storybook artifact
        uses: actions/upload-artifact@v7
        with:
          name: pages-storybook
          path: ${{ inputs.frontend-dir }}/storybook-static

  # Javadoc のビルド処理
  build-javadoc:
    name: Build Javadoc
    if: ${{ inputs.build-javadoc || inputs.is-deploy }}
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout-minutes }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: ${{ inputs.java-version }}
          distribution: ${{ inputs.distribution }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Make Gradle Wrapper executable
        working-directory: ${{ inputs.backend-dir }}
        run: chmod +x ./gradlew

      - name: Build Javadoc
        working-directory: ${{ inputs.backend-dir }}
        run: ./gradlew javadoc

      - name: Upload Javadoc artifact
        uses: actions/upload-artifact@v7
        with:
          name: pages-javadoc
          path: ${{ inputs.backend-dir }}/build/docs/javadoc

  # OpenAPI ドキュメントのビルド処理
  # Spring Boot を起動して /v3/api-docs.yaml を生成し、Redoc で HTML に変換する
  build-openapi:
    name: Build OpenAPI Docs
    if: ${{ inputs.build-openapi || inputs.is-deploy }}
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout-minutes }}

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: kumamoto_henno_map
          POSTGRES_USER: user
          POSTGRES_PASSWORD: pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: ${{ inputs.java-version }}
          distribution: ${{ inputs.distribution }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Make Gradle Wrapper executable
        working-directory: ${{ inputs.backend-dir }}
        run: chmod +x ./gradlew

      # DDL・DML を実行してテーブル・ビュー・初期データを作成
      - name: Initialize database
        run: PGPASSWORD=pass psql -h localhost -U user -d kumamoto_henno_map -f config/database/setup.sql

      # Spring Boot を起動して /v3/api-docs.yaml を生成
      - name: Generate OpenAPI YAML
        working-directory: ${{ inputs.backend-dir }}
        run: ./gradlew generateOpenApiDocs
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: kumamoto_henno_map
          DB_USERNAME: user
          DB_PASSWORD: pass

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}

      # 生成した YAML を Redoc で静的 HTML に変換し、YAML 自体も一緒に配置
      # → GitHub Pages の /openapi/index.html と /openapi/openapi.yaml の両方を提供
      - name: Build ReDoc HTML
        run: |
          npx --yes @redocly/cli@latest build-docs \
            ${{ inputs.backend-dir }}/build/openapi/openapi.yaml \
            --output ./openapi-build/index.html \
            --title "くまもと自主返納特典マップ API"
          cp ${{ inputs.backend-dir }}/build/openapi/openapi.yaml ./openapi-build/openapi.yaml

      - name: Upload OpenAPI artifact
        uses: actions/upload-artifact@v7
        with:
          name: pages-openapi
          path: ./openapi-build

  # ドキュメントとStorybookとJavadocとOpenAPIを結合してデプロイ
  deploy:
    name: Combine and Deploy to GitHub Pages
    needs: [build-docs, build-storybook, build-javadoc, build-openapi]
    runs-on: ubuntu-latest
    if: >-
      inputs.is-deploy &&
      (needs.build-storybook.result == 'success' || needs.build-storybook.result == 'skipped') &&
      (needs.build-javadoc.result == 'success' || needs.build-javadoc.result == 'skipped') &&
      (needs.build-openapi.result == 'success' || needs.build-openapi.result == 'skipped')
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v6

      # ドキュメントをルートに配置
      - name: Download docs artifact
        uses: actions/download-artifact@v8
        with:
          name: pages-docs
          path: ./site

      # Storybook を /storybook/ サブディレクトリに配置
      - name: Download Storybook artifact
        uses: actions/download-artifact@v8
        with:
          name: pages-storybook
          path: ./site/storybook

      # Javadoc を /javadoc/ サブディレクトリに配置
      - name: Download Javadoc artifact
        uses: actions/download-artifact@v8
        with:
          name: pages-javadoc
          path: ./site/javadoc

      # OpenAPI を /openapi/ サブディレクトリに配置
      - name: Download OpenAPI artifact
        uses: actions/download-artifact@v8
        with:
          name: pages-openapi
          path: ./site/openapi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
