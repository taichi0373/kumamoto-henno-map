name: Build for backend

# ワークフロー共有設定
on:
  workflow_call:
    inputs:
      timeout-minutes:
        description: 'タイムアウト（分）'
        type: number
        default: 20
      backend-dir:
        description: 'バックエンドディレクトリ'
        type: string
        default: 'apps/back'
      java-distribution:
        description: 'Javaディストリビューション'
        type: string
        default: 'adopt'
      java-version:
        description: 'Javaバージョン'
        type: string
        default: '11'
  
env:
  TZ: Asia/Tokyo
  BACKEND_DIR: ${{ inputs.backend-dir }}

# jobs: 動作内容
jobs:
  # バックエンドのビルド処理
  backend-build:
    name: Backend Build
    timeout-minutes: ${{ inputs.timeout-minutes }}
    # Github-hosted runner を使用
    runs-on: ubuntu-latest

    env:
      GITHUB_USERNAME: ${{ github.actor }}
      GITHUB_TOKEN: ${{ secrets.MACHINE_GITHUB_TOKEN }}

    defaults:
      run:
        working-directory: ${{ env.BACKEND_DIR }}

    # steps: 動作手順
    steps:
 
      # Workspace の所有権修正（self-hosted対策）
      - name: Fix workspace permission
        run: sudo chown -R $USER:$USER ${{ github.workspace }}
        working-directory: ${{ github.workspace }}

      # リポジトリ取得
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.MACHINE_GITHUB_TOKEN }}
          submodules: true

      # Java セットアップ
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: ${{ inputs.java-distribution }}
          java-version: ${{ inputs.java-version }}
          cache: gradle

      # ビルド
      - name: Compile
        run: ./gradlew compileJava

      # Javadoc 生成
      - name: Generate Javadoc
        run: ./gradlew aggregateJavadoc

      # Javadoc アップロード
      - name: Upload Javadoc
        uses: actions/upload-artifact@v4
        with:
          name: backend-javadoc
          path: ${{ env.BACKEND_DIR }}/build/docs/aggregateJavadoc