name: Review Precheck

# ワークフロー共有設定
on:
  workflow_call:
    inputs:
      timeout-minutes:
        type: number
        default: 3

      frontend-dir:
        type: string
        default: 'apps/front'

      component-dir:
        type: string
        default: 'apps/front/src/components'

      backend-dir:
        type: string
        default: 'apps/back'

      # openapi-dir:
      #   type: string

      document-dir:
        type: string
        default: 'docs'

    # アウトプット
    outputs:
      frontend-changed:
        value: ${{ jobs.precheck.outputs.frontend-changed }}
      component-changed:
        value: ${{ jobs.precheck.outputs.component-changed }}
      backend-changed:
        value: ${{ jobs.precheck.outputs.backend-changed }}
      # openapi-changed:
      #   value: ${{ jobs.precheck.outputs.openapi-changed }}
      document-changed:
        value: ${{ jobs.precheck.outputs.document-changed }}

env:
  TZ: Asia/Tokyo
  FRONTEND_DIR: ${{ inputs.frontend-dir }}
  COMPONENT_DIR: ${{ inputs.component-dir }}
  BACKEND_DIR: ${{ inputs.backend-dir }}
  # OPENAPI_DIR: ${{ inputs.openapi-dir }}
  DOCUMENT_DIR: ${{ inputs.document-dir }}

# jobs: 動作内容
jobs:
  # 前処理（差分のチェック）
  precheck:
    name: Diff Precheck
    # Github-hosted runner を使用
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout-minutes }}

    outputs:
      frontend-changed: ${{ steps.frontend.outputs.any_changed }}
      component-changed: ${{ steps.component.outputs.any_changed }}
      backend-changed: ${{ steps.backend.outputs.any_changed }}
      # openapi-changed: ${{ steps.openapi.outputs.any_changed }}
      document-changed: ${{ steps.document.outputs.any_changed }}
    

    steps:
      # 全履歴取得（差分検知必須）
      # PRイベント: PRのhead SHA / pushイベント: プッシュされたSHAを使用
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      # PRイベント: ベースブランチを取得
      - name: Fetch base branch (PR)
        if: github.event_name == 'pull_request'
        run: git fetch origin ${{ github.event.pull_request.base.ref }} --depth=1

      # pushイベント: 直前のコミットを取得（ブランチ初回push以外）
      - name: Fetch before commit (Push)
        if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
        run: git fetch origin ${{ github.event.before }} --depth=1
            
      # 2. フロントエンド差分チェック
      - name: Frontend diff
        id: frontend
        uses: tj-actions/changed-files@v47
        with:
          files: ${{ env.FRONTEND_DIR }}/**

      # 3. コンポーネント差分チェック
      - name: Component diff
        id: component
        uses: tj-actions/changed-files@v47
        with:
          files: ${{ env.COMPONENT_DIR }}/**

      # 4. バックエンド差分チェック
      - name: Backend diff
        id: backend
        uses: tj-actions/changed-files@v47
        with:
          files: ${{ env.BACKEND_DIR }}/**

      # # 5. OpenAPI差分チェック
      # - name: OpenAPI diff
      #   id: openapi
      #   if: env.OPENAPI_DIR != ''
      #   uses: tj-actions/changed-files@v34
      #   with:
      #     files: ${{ env.OPENAPI_DIR }}/**

      # 6. ドキュメント差分チェック
      - name: Document diff
        id: document
        uses: tj-actions/changed-files@v47
        with:
          files: ${{ env.DOCUMENT_DIR }}/**