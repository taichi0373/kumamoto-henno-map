name: Build for OTP
on:
  push:
    branches: ["develop", "develop-oci"]
    paths:
      - 'docker-compose.yml'
      - 'config/otp/**'
  pull_request:
    paths:
      - 'docker-compose.yml'
      - 'config/otp/**'

jobs:
  graph-build:
    # Github-hosted runner を使用
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check GTFS filename
        run: |
          if ! ls config/otp/data/*gtfs*.zip >/dev/null 2>&1; then
            echo "ERROR: GTFS file name must contain 'gtfs'"
            exit 1
          fi

      - name: Build OTP graph
        run: |
          docker run --rm \
            -e JAVA_TOOL_OPTIONS=-Xmx4g \
            -v "$PWD/config/otp/data":/var/opentripplanner \
            docker.io/opentripplanner/opentripplanner:2.5.0 \
            --build --save

      - name: Verify graph.obj exists
        run: |
          if [ ! -f config/otp/data/graph.obj ]; then
            echo "ERROR: graph.obj was not generated"
            exit 1
          fi

      - name: Upload graph artifact
        uses: actions/upload-artifact@v7
        with:
          name: otp-graph-2.5.0
          path: config/otp/data/graph.obj
          retention-days: 7
