name: Deploy Docsify to Pages

# ワークフロー共有設定
on:
  workflow_call:
    inputs:
      timeout-minutes:
        description: 'タイムアウト（分）'
        type: number
        default: 10

      document-dir:
        description: 'ドキュメントディレクトリ'
        type: string
        default: 'docs'

env:
  TZ: Asia/Tokyo
  DOCUMENT_DIR: ${{ inputs.document-dir }}

permissions:
  contents: read
  pages: write
  id-token: write

# jobs: 動作内容
jobs:
  # ドキュメントのデプロイ処理
  document-deploy:
    name: Document Deploy
    # Github-hosted runner を使用
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout-minutes }}

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    # steps: 動作手順
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.DOCUMENT_DIR }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
