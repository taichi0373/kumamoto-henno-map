# ===== 基本設定 =====
spring.application.name=back
server.port=8081
server.servlet.context-path=/kumamoto-henno-map/api

# ===== PostgreSQL データソース =====
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:kumamoto_henno_map_test}
spring.datasource.username=${DB_USERNAME:user}
spring.datasource.password=${DB_PASSWORD:pass}

# ===== Doma 設定 =====
spring.doma.sql-file-enabled=true
spring.doma.jdbc-logger=SLF4J

# ===== ロギング =====
logging.level.io.github.taichi0373.kumamoto_henno_map=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN

# ===== CORS 設定 =====
cors.allowed-origins=http://localhost:3000,http://localhost:6006
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true

# ===== JWT 設定 =====
# テスト用固定シークレット（環境変数不要）
jwt.secret=test-secret-key-for-unit-tests-only-not-for-production-use
jwt.expiration=3600000

# ===== OTP 設定 =====
otp.api.url=http://localhost:8080/otp/routers/default/plan
