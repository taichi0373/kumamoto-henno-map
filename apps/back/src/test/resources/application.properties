# ===========================================
# Application Configuration
# ===========================================
spring.application.name=benefit-map-backend
server.port=8081
server.servlet.context-path=/api

# ===========================================
# HTTP Client Configuration
# ===========================================
spring.http.client.factory=simple
spring.webflux.multipart.max-in-memory-size=1MB
spring.webflux.multipart.max-disk-usage-per-part=10MB

# ===========================================
# Database Configuration
# ===========================================
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Tokyo

# ===========================================
# Session Configuration
# ===========================================
spring.session.store-type=jdbc
spring.session.timeout=1800
spring.session.jdbc.initialize-schema=embedded

# ===========================================
# Security Configuration (JWT)
# ===========================================
jwt.secret=myVerySecureSecretKeyForJWTTokenGenerationThatShouldBeLongEnoughAndSecure2024
jwt.expiration=86400000

# ===========================================
# CORS Configuration
# ===========================================
cors.allowed-origins=http://localhost:3000,http://localhost:6006,http://127.0.0.1:3000,http://127.0.0.1:6006
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=Content-Type,Authorization,X-Requested-With
cors.allow-credentials=true
cors.max-age=3600

# ===========================================
# External API Configuration
# ===========================================
yahoo.api.key=dj00aiZpPUl5OUhKWmhjV3B1VyZzPWNvbnN1bWVyc2VjcmV0Jng9NDM-
yahoo.api.url=https://map.yahooapis.jp/search/local/V1/localSearch
yahoo.api.timeout=10000

# ===========================================
# Logging Configuration
# ===========================================
logging.level.io.github.taichi0373.benefit_map=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ===========================================
# Development Configuration
# ===========================================
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true