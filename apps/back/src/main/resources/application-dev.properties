# ===== 開発環境専用設定 =====
# このファイルは spring.profiles.active=dev のときのみ読み込まれる。
# 本番環境では絶対に使用しないこと。

# JWT シークレット（開発用デフォルト値。本番は環境変数 JWT_SECRET を必ず設定すること）
jwt.secret=${JWT_SECRET:benefit-map-jwt-secret-key-for-development-please-change-in-production}

# Cookie Secure 属性（開発環境は HTTP のため false）
app.security.cookie.secure=false

# OpenAPI エンドポイント（開発環境のみ有効）
# 本番は false（application.properties のデフォルト）のまま
# CI は customBootRun の jvmArgs で dev プロファイルを有効化するため generateOpenApiDocs が動作する
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
