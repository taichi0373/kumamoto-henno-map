# ===== 開発環境専用設定 =====
# このファイルは spring.profiles.active=dev のときのみ読み込まれる。
# 本番環境では絶対に使用しないこと。

# JWT シークレット（開発環境では未設定時に開発用デフォルト値を使用。本番環境では環境変数 JWT_SECRET の設定を必須とすること）
jwt.secret=${JWT_SECRET:kumamoto-henno-map-jwt-secret-key-for-development-please-change-in-production}

# リフレッシュトークンCookieのSecure属性（開発環境はHTTPのためfalse）
app.security.cookie.secure=false

# 転送ヘッダー処理（開発環境はプロキシなしのため NONE で固定）
server.forward-headers-strategy=NONE

# メール設定（開発環境: SendGrid sandbox モード）
#
# [デフォルト: sandbox=true]
#   SendGrid に HTTP リクエストは飛ぶがメールは実際には送信されない。
#   CI（OpenAPI生成等）はダミーキー・ダミーアドレスのまま起動できる。
#
# [実送信テスト: sandbox=false]
#   以下の3変数をすべて環境変数で上書きすること。
#   MAIL_FROM は SendGrid の Sender Authentication で認証済みのアドレスでないと
#   403 Forbidden で拒否される（noreply@example.com のままでは送信不可）。
#
#   SENDGRID_API_KEY=SG.xxxx          # SendGrid APIキー（Mail Send権限）
#   SENDGRID_SANDBOX=false            # 実送信を有効化
#   MAIL_FROM=noreply@kumamoto-henno-map.com  # SendGrid認証済みアドレス
sendgrid.api-key=${SENDGRID_API_KEY:dummy-key-for-dev}
sendgrid.sandbox=${SENDGRID_SANDBOX:true}
app.mail.from=${MAIL_FROM:noreply@example.com}

# ===== 管理者初期化（開発環境デフォルト） =====
admin.username=${ADMIN_USERNAME:admin}
admin.password=${ADMIN_PASSWORD:admin}
admin.email=${ADMIN_EMAIL:admin@example.com}

# ===== ロギング =====
logging.level.io.github.taichi0373.kumamoto_henno_map=DEBUG
logging.level.org.springframework.web=DEBUG

# OpenAPI エンドポイント（開発環境のみ有効）
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
