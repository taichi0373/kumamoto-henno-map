# ===== 開発環境専用設定 =====
# このファイルは spring.profiles.active=dev のときのみ読み込まれる。
# 本番環境では絶対に使用しないこと。

# JWT シークレット（本番は開発用デフォルト値。環境変数 JWT_SECRET を必ず設定すること）
jwt.secret=${JWT_SECRET:benefit-map-jwt-secret-key-for-development-please-change-in-production}

# Cookie Secure 属性（開発環境は HTTP のため false）
app.security.cookie.secure=false

# メール設定（開発環境: Mailtrap）
# デフォルト値は CI（OpenAPI生成等）でメール送信なしに起動するためのダミー値
# 実際にメール送信が必要な場合は環境変数を設定すること
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=2525
spring.mail.username=${MAIL_USERNAME:ci-noreply@example.com}
spring.mail.password=${MAIL_PASSWORD:dummy}

# ===== ロギング =====
logging.level.io.github.taichi0373.benefit_map=DEBUG
logging.level.org.springframework.web=DEBUG

# OpenAPI エンドポイント（開発環境のみ有効）
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
