# ===== 基本設定 =====
spring.application.name=back
server.port=${PORT:8081}
server.servlet.context-path=/kumamoto-henno-map/api
# 転送ヘッダー処理戦略（環境変数 FORWARD_HEADERS_STRATEGY で上書き可能）
# - NONE    : 転送ヘッダーを無視する。直接公開またはプロキシなし構成向け（デフォルト）
# - FRAMEWORK: Spring が X-Forwarded-For を処理し getRemoteAddr() に実クライアントIPを反映する。
#              リバースプロキシ/Ingress 配下で運用する場合は必ずこちらに設定すること。
#              ※ NONE のままプロキシ配下に置くと getRemoteAddr() がプロキシIPになり、
#                 試行制限が全ユーザー共通になって正当なユーザーを誤ブロックする恐れがある。
#              ※ FRAMEWORK に設定する場合はプロキシ側で信頼できる送信元のみ
#                 X-Forwarded-For を付与するよう必ず設定すること（クライアント偽装防止）。
server.forward-headers-strategy=${FORWARD_HEADERS_STRATEGY:NONE}

# ===== PostgreSQL データソース =====
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:kumamoto_henno_map}${DB_SSL_PARAMS:}
spring.datasource.username=${DB_USERNAME:user}
spring.datasource.password=${DB_PASSWORD:pass}

# ===== Doma 設定 =====
spring.doma.sql-file-enabled=true
spring.doma.jdbc-logger=SLF4J

# ===== CORS 設定 =====
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:6006}
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
# 同一オリジン proxy モデルのため false（ブラウザ→フロントプロキシ→バックエンドの経路では CORS は発生しない）
# Swagger UI 等で直接バックエンドにアクセスする場合も credentials 不要
cors.allow-credentials=false

# ===== JWT 設定 =====
# jwt.secret は環境変数 JWT_SECRET で必ず設定すること（デフォルトなし）
jwt.secret=${JWT_SECRET}
# アクセストークン有効期限（ミリ秒）: 1時間
jwt.expiration=3600000
# リフレッシュトークン有効期限（秒）: 30日
jwt.refresh-expiration=2592000

# ===== Cookie セキュリティ設定 =====
# リフレッシュトークンCookieのSecure属性（本番環境はHTTPSのためtrue）
app.security.cookie.secure=true

# ===== メール設定（SendGrid HTTP API） =====
# 本番環境では必ず環境変数で設定すること（未設定の場合は起動失敗）
sendgrid.api-key=${SENDGRID_API_KEY}
sendgrid.sandbox=false
app.mail.from=${MAIL_FROM}

# パスワードリセットURL（フロントエンドのベースURL）
app.password-reset.base-url=${FRONTEND_BASE_URL:http://localhost:3000}

# ===== OTP 設定 =====
otp.api.url=${OTP_API_URL:http://localhost:8080/otp/routers/default/plan}

# ===== 管理者初期化設定 =====
admin.username=${ADMIN_USERNAME:}
admin.password=${ADMIN_PASSWORD:}
admin.email=${ADMIN_EMAIL:}

# ===== AWS Location Service 設定 =====
aws.region=${AWS_REGION:us-east-1}
aws.location.place-index-name=${AWS_LOCATION_PLACE_INDEX:kumamoto-henno-map-index}

# ===== Slack Webhook 設定 =====
slack.webhook.url=${SLACK_WEBHOOK_URL:}

# ===== springdoc / OpenAPI 設定 =====
# 本番では /v3/api-docs・Swagger UI を両方無効化（404 を返す）
# 開発環境は application-dev.properties で上書きする
springdoc.api-docs.path=/v3/api-docs
springdoc.api-docs.enabled=false
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=false
