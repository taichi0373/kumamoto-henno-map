# ===== 基本設定 =====
spring.application.name=back
server.port=8081
server.servlet.context-path=/api

# ===== PostgreSQL データソース =====
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://172.21.158.200:5432/benefit_map
spring.datasource.username=postgres
spring.datasource.password=postgres

# ===== Doma 設定 =====
# SQLファイルを利用する場合は true に
spring.doma.sql-file-enabled=true
# SQLログを SLF4J に出力
spring.doma.jdbc-logger=SLF4J

# ===== セッション管理 =====
spring.session.store-type=jdbc
spring.session.timeout=30m  # 秒から Duration に変更（30分）

# ===== ロギング =====
logging.level.io.github.taichi0373.benefit_map=DEBUG
logging.level.org.springframework.web=DEBUG

# ===== CORS 設定 =====
cors.allowed-origins=http://localhost:3000,http://localhost:6006
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true

