# ===== 基本設定 =====
spring.application.name=back
server.port=8081
server.servlet.context-path=/benefit-map/api

# ===== PostgreSQL データソース =====
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:benefit_map}
spring.datasource.username=${DB_USERNAME:user}
spring.datasource.password=${DB_PASSWORD:pass}

# ===== Doma 設定 =====
spring.doma.sql-file-enabled=true
spring.doma.jdbc-logger=SLF4J

# ===== CORS 設定 =====
cors.allowed-origins=http://localhost:3000,http://localhost:6006
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true

# ===== JWT 設定 =====
# jwt.secret は環境変数 JWT_SECRET で必ず設定すること（デフォルトなし）
jwt.secret=${JWT_SECRET}
jwt.expiration=3600000

# ===== Cookie セキュリティ設定 =====
# Cookie Secure 属性（本番環境は HTTPS のため true）
app.security.cookie.secure=true

# ===== メール設定 =====
# 本番環境では必ず環境変数で設定すること（未設定の場合は起動失敗）
# 開発環境は application-dev.properties の Mailtrap 設定を使用する
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_FROM:${spring.mail.username}}

# パスワードリセットURL（フロントエンドのベースURL）
app.password-reset.base-url=${FRONTEND_BASE_URL:http://localhost:3000}

# ===== OTP 設定 =====
otp.api.url=http://localhost:8080/otp/routers/default/plan

# ===== springdoc / OpenAPI 設定 =====
# 本番では /v3/api-docs・Swagger UI を両方無効化（404 を返す）
# 開発環境は application-dev.properties で上書きする
springdoc.api-docs.path=/v3/api-docs
springdoc.api-docs.enabled=false
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=false
